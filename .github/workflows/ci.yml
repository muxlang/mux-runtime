name: Build
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  detect-changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      runtime_src: ${{ steps.filter.outputs.runtime_src }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590
        id: filter
        with:
          filters: |
            runtime_src:
              - 'src/**'
              - 'benches/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/ci.yml'

  rust_checks:
    name: Rust Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Postgres + MySQL back the sql driver coverage; the gated driver tests are
    # skipped when their *_URL env vars are unset, so this is the only job that
    # exercises them.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: mux
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: muxdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mux -d muxdb"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: pass
          MYSQL_DATABASE: muxdb
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -uroot -ppass"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 15
    env:
      MUX_TEST_POSTGRES_URL: postgres://mux:pass@localhost:5432/muxdb
      MUX_TEST_MYSQL_URL: mysql://root:pass@localhost:3306/muxdb
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: 1.93.1
          components: rustfmt, clippy, llvm-tools-preview
      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Install cargo-llvm-cov
        run: command -v cargo-llvm-cov || cargo install cargo-llvm-cov --locked
      - name: Formatting check
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Tests with coverage
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info
          if-no-files-found: error

  benchmarks:
    name: Benchmarks (report-only)
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.runtime_src == 'true' || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Informational only: shared GitHub runners are too noisy for a benchmark
    # threshold, so this never gates merges (continue-on-error). Pure Rust, no
    # LLVM. The low-noise comparison is local: `cargo bench -- --save-baseline
    # main` then `--baseline main`.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: 1.93.1
      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Run benchmarks
        id: run
        run: |
          set -o pipefail
          cargo bench --bench hot_paths 2>&1 | tee bench.log
      - name: Upload benchmark report
        uses: actions/upload-artifact@v4
        with:
          name: runtime-benchmark-report
          path: target/criterion/
          if-no-files-found: warn
      - name: Build PR comment payload
        if: ${{ always() && github.event_name == 'pull_request' }}
        env:
          TITLE: "Benchmarks (report-only)"
          OUTCOME: ${{ steps.run.outcome }}
          LOG: bench.log
          SHA: ${{ github.event.pull_request.head.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          mkdir -p pr-comment
          if [ "$OUTCOME" = "success" ]; then status="completed"; else status="errored"; fi
          sanitized="$(sed 's/```/`\xE2\x80\x8b``/g' "$LOG" 2>/dev/null | tail -n 300)"
          {
            printf '## %s - %s\n\n' "$TITLE" "$status"
            printf '_Informational only - shared runners are too noisy to gate on. Full Criterion data is in the `runtime-benchmark-report` artifact._\n\n'
            printf '<details><summary>Output (last 300 lines)</summary>\n\n'
            printf '```text\n'
            printf '%s\n' "${sanitized:-(no output captured)}"
            printf '```\n\n</details>\n\n'
            printf '_Commit `%s` - [full run](%s)_\n' "$SHA" "$RUN_URL"
          } > pr-comment/report.md
      - name: Upload PR comment payload
        if: ${{ always() && github.event_name == 'pull_request' }}
        uses: actions/upload-artifact@v4
        with:
          name: pr-comment-benchmarks
          path: pr-comment/
          if-no-files-found: warn

  downstream_compiler_smoke:
    name: Downstream Compiler Smoke Test
    # Verifies that muxlang/mux-compiler (main) still builds and links against
    # THIS branch's runtime source. Catches breaking FFI/symbol changes in the
    # runtime PR that introduces them, instead of after merge/publish.
    # Depend on rust_checks so this only runs once the runtime is known to
    # compile cleanly in isolation, keeping failure attribution clear.
    needs: [detect-changes, rust_checks]
    if: ${{ needs.detect-changes.outputs.runtime_src == 'true' || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # Mirrors muxlang/mux-compiler's .github/workflows/build.yml toolchain env
      # so the runtime is built and linked the same way the compiler CI does it.
      LLVM_SYS_221_PREFIX: /usr/lib/llvm-22
      LLVM_CONFIG_PATH: /usr/bin/llvm-config-22
      LLVM_SYS_221_STRICT_VERSIONING: "1"
      CC: clang-22
      CXX: clang++-22
      # Build the runtime from THIS PR's checked-out source, not from crates.io.
      MUX_RUNTIME_SRC: ${{ github.workspace }}
    steps:
      - name: Check out runtime (this PR)
        uses: actions/checkout@v4
      - name: Check out mux-compiler (main)
        uses: actions/checkout@v4
        with:
          repository: muxlang/mux-compiler
          ref: main
          path: mux-compiler
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: 1.93.1
      - name: Install LLVM 22
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ca-certificates gnupg lsb-release wget
          sudo wget --max-redirect=0 -O /usr/share/keyrings/llvm-snapshot.gpg.key https://apt.llvm.org/llvm-snapshot.gpg.key
          echo "deb [signed-by=/usr/share/keyrings/llvm-snapshot.gpg.key] https://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-22 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y llvm-22-dev clang-22 libpolly-22-dev
      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          # Intentionally NOT caching ~/.cache/mux-lang: the compiler builds the
          # runtime from source there, and this job exists to exercise THIS
          # branch's runtime source, so it must rebuild it fresh every run.
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            mux-compiler/target
          key: ${{ runner.os }}-downstream-cargo-${{ hashFiles('mux-compiler/Cargo.lock') }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-downstream-cargo-
      - name: Compiler executable integration tests against runtime source
        # These tests compile and link .mux programs end to end, so an
        # undefined-symbol / FFI-signature break in the runtime fails here.
        working-directory: mux-compiler
        run: cargo test -p mux-lang --test executable_integration

  valgrind:
    name: Valgrind Memory Checks
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.runtime_src == 'true' || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Runs the runtime's own cargo test binaries under Memcheck. Same failure
    # policy as the compiler's Leg A (muxlang/mux-compiler#246): definitely-lost
    # and indirectly-lost leaks and memory errors fail; still-reachable and
    # possibly-lost are ignored. The SQL/net driver tests that need external
    # services stay skipped here (their *_URL env vars are unset), so this job
    # exercises the pure-Rust runtime surface deterministically.
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: 1.93.1
      - name: Install Valgrind
        run: |
          sudo apt-get update
          sudo apt-get install -y valgrind
      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Run tests under Valgrind
        id: run
        # Manual Valgrind (not cargo-valgrind): it keeps the exact same flags and
        # leak policy as the compiler CI, needs no extra crate pinned in the
        # toolchain, and makes each test binary's report explicit in the log.
        run: |
          set -euo pipefail
          exec > >(tee valgrind.log) 2>&1
          # The commas below are part of the flag values, not array separators.
          # shellcheck disable=SC2054
          flags=(
            --quiet
            --error-exitcode=99
            --leak-check=full
            --errors-for-leak-kinds=definite,indirect
            --show-leak-kinds=definite,indirect
          )
          json="$(cargo test --no-run --all-features --workspace --message-format=json)"
          mapfile -t bins < <(printf '%s\n' "$json" \
            | jq -r 'select(.executable != null and .profile.test == true) | .executable')
          if [ "${#bins[@]}" -eq 0 ]; then
            echo "No test binaries were produced" >&2
            exit 1
          fi
          fail=0
          for bin in "${bins[@]}"; do
            echo ">>> valgrind $bin"
            if ! valgrind "${flags[@]}" "$bin" --test-threads=1; then
              echo "::error::Valgrind reported definite/indirect leaks or memory errors in $bin"
              fail=1
            fi
          done
          exit "$fail"
      - name: Build PR comment payload
        if: ${{ always() && github.event_name == 'pull_request' }}
        env:
          TITLE: "Valgrind Memory Checks"
          OUTCOME: ${{ steps.run.outcome }}
          LOG: valgrind.log
          SHA: ${{ github.event.pull_request.head.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          mkdir -p pr-comment
          if [ "$OUTCOME" = "success" ]; then status="PASSED"; else status="FAILED"; fi
          # Neutralize any ``` in untrusted output so a hostile PR can't break
          # out of the code fence and inject markdown into the posted comment.
          sanitized="$(sed 's/```/`\xE2\x80\x8b``/g' "$LOG" 2>/dev/null | tail -n 300)"
          {
            printf '## %s - %s\n\n' "$TITLE" "$status"
            printf '<details><summary>Output (last 300 lines)</summary>\n\n'
            printf '```text\n'
            printf '%s\n' "${sanitized:-(no output captured)}"
            printf '```\n\n</details>\n\n'
            printf '_Commit `%s` - [full run](%s)_\n' "$SHA" "$RUN_URL"
          } > pr-comment/report.md
      - name: Upload PR comment payload
        if: ${{ always() && github.event_name == 'pull_request' }}
        uses: actions/upload-artifact@v4
        with:
          name: pr-comment-valgrind
          path: pr-comment/
          if-no-files-found: warn

  sonarqube:
    name: SonarQube
    needs: rust_checks
    if: ${{ always() }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Disable shallow clone for better analysis relevancy
      - name: Download coverage report
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: coverage-lcov
      - name: Normalize coverage paths
        # cargo-llvm-cov writes absolute SF paths; make them relative to the repo
        # root so the SonarQube Rust LCOV importer can match them to indexed files.
        run: '[ -f lcov.info ] && sed -i "s#${{ github.workspace }}/##g" lcov.info || true'
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      # The free SonarCloud plan locks every project to the built-in "Sonar way"
      # gate, which only fails on rating/coverage thresholds and lets new issues
      # (e.g. a single code smell) through. Enforce "zero new issues" ourselves:
      # the scan above waits for analysis (sonar.qualitygate.wait), so the count
      # is queryable here.
      - name: Fail on new SonarCloud issues
        if: github.event_name == 'pull_request'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          api="https://sonarcloud.io/api/issues/search?componentKeys=muxlang_mux-runtime&pullRequest=${PR_NUMBER}&resolved=false&inNewCodePeriod=true&ps=1"
          # Query the issues search endpoint rather than measures: its .total is
          # always present (0 for a clean PR), so "no new issues" is never
          # confused with "measure omitted from the response". Retry to ride out
          # indexing lag; no readable .total after retries fails closed.
          count=""
          for attempt in 1 2 3 4 5; do
            resp=$(curl -sf -u "$SONAR_TOKEN:" "$api") || { sleep 5; continue; }
            count=$(printf '%s' "$resp" | jq -r '.total // empty')
            [ -n "$count" ] && break
            sleep 5
          done
          if [ -z "$count" ]; then
            echo "::error::Could not read the new-issue count for PR #${PR_NUMBER} from SonarCloud after retries."
            exit 1
          fi
          echo "New SonarCloud issues on PR #${PR_NUMBER}: ${count}"
          if [ "$count" -gt 0 ]; then
            echo "::error::${count} new SonarCloud issue(s) introduced on this PR. See https://sonarcloud.io/project/issues?id=muxlang_mux-runtime&pullRequest=${PR_NUMBER}&resolved=false"
            exit 1
          fi
