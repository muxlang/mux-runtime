name: PR Report Comment
# Posts the valgrind / benchmark reports produced by the "Build" workflow as a
# comment on the PR. This is a SEPARATE workflow triggered via workflow_run so
# it runs in the trusted base-repo context (with a write token) even when the
# "Build" run it reports on came from an untrusted fork PR.
#
# Threat model: a fork controls its own Build workflow (pull_request runs the
# fork's copy), so EVERYTHING the Build uploads is untrusted. This workflow
# therefore:
#   - resolves the target PR only from trusted workflow_run metadata (head repo
#     + branch + SHA), never from artifact data;
#   - consumes only the raw logs from the exact expected artifacts and does the
#     fence-escaping, length cap, and markdown assembly HERE (a fork cannot make
#     the Build skip escaping it does not perform);
#   - takes pass/fail from the trusted jobs API, not from the artifact.
# It never checks out or executes the PR's code.
#
# NOTE: workflow_run only fires for the copy of this file on the default branch,
# so it takes effect once merged to main (not from the PR that adds it).
on:
  workflow_run:
    workflows: ["Build"]
    types: [completed]

permissions:
  contents: read
  actions: read # download artifacts + read job conclusions from the run
  pull-requests: write # post the comment

jobs:
  comment:
    # Only PR-triggered Build runs carry a PR to comment on (skip push to main).
    if: ${{ github.event.workflow_run.event == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Resolve target PR from trusted metadata
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          HEAD_OWNER: ${{ github.event.workflow_run.head_repository.owner.login }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -euo pipefail
          # Match the triggering PR by its trusted head owner:branch, then confirm
          # the head SHA and require exactly one open match. This is reliable for
          # forks (workflow_run.pull_requests[] is empty for them) and cannot be
          # influenced by artifact contents.
          mapfile -t hits < <(
            gh api "repos/$REPO/pulls?state=open&head=$HEAD_OWNER:$HEAD_BRANCH&per_page=100" \
              --jq '.[] | "\(.number) \(.head.sha)"' \
              | awk -v s="$HEAD_SHA" '$2 == s { print $1 }'
          )
          if [ "${#hits[@]}" -eq 1 ]; then
            echo "number=${hits[0]}" >> "$GITHUB_OUTPUT"
          else
            echo "Expected exactly one open PR for $HEAD_OWNER:$HEAD_BRANCH@$HEAD_SHA, found ${#hits[@]}; nothing to comment."
            echo "number=" >> "$GITHUB_OUTPUT"
          fi
      - name: Download report artifacts from the triggering run
        if: ${{ steps.pr.outputs.number != '' }}
        continue-on-error: true # a path-skipped Build uploads no artifacts
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pattern: pr-comment-*
          path: reports
      - name: Assemble and post comment
        if: ${{ steps.pr.outputs.number != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ steps.pr.outputs.number }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          set -euo pipefail
          # Only these artifacts are consumed; any other pr-comment-* artifact a
          # fork may have uploaded is ignored. Each raw log is treated as
          # UNTRUSTED and escaped/capped HERE. Fields: artifact|logfile|job name|kind
          specs=(
            "pr-comment-valgrind|valgrind.log|Valgrind Memory Checks|gated"
            "pr-comment-benchmarks|bench.log|Benchmarks (report-only)|report"
          )
          jobs_json="$(gh api "repos/$REPO/actions/runs/$RUN_ID/jobs?per_page=100" --jq '.jobs')"
          # When the report jobs were path-skipped there are no artifacts. Only
          # surface that explicitly for PRs that actually changed the CI/report
          # workflows (the case where verifying the pipeline matters); staying
          # quiet on unrelated PRs (docs, etc.) avoids comment noise.
          touched_ci="$(gh api --paginate "repos/$REPO/pulls/$PR/files?per_page=100" \
            --jq '.[].filename' | grep -Ec '^\.github/workflows/' || true)"

          # INJECTION MODEL: charts/tables below must contain ONLY data this step
          # can prove safe - integers/floats we numeric-validate, and group labels
          # from the fixed whitelist BELOW (never a string read from an artifact).
          # A fork-controlled name/median that fails validation is dropped, not
          # echoed. The one place raw fork text appears is the escaped <details>.

          # Render the fork-controlled raw log inside a code fence it cannot break
          # out of: open with MORE backticks than the longest backtick run inside
          # (a fence only closes on an equal-or-longer run).
          emit_raw_details() {
            local logf="$1" summary="$2" content maxrun fence_len fence
            content="$(tail -n 300 "$logf")"
            maxrun="$(printf '%s' "$content" | { grep -oE '`+' || true; } | awk '{ if (length > m) m = length } END { print m + 0 }')"
            fence_len=3
            [ "${maxrun:-0}" -ge 3 ] && fence_len=$(( maxrun + 1 ))
            fence="$(printf '`%.0s' $(seq "$fence_len"))"
            printf '<details><summary>%s</summary>\n\n' "$summary"
            printf '%stext\n' "$fence"
            printf '%s\n' "${content:-(no output captured)}"
            printf '%s\n\n</details>\n\n' "$fence"
          }

          is_num() { [[ "$1" =~ ^[0-9]+(\.[0-9]+)?$ ]]; }

          human_ns() {
            awk -v ns="$1" 'BEGIN {
              if (ns >= 1e9) printf "%.3g s", ns/1e9;
              else if (ns >= 1e6) printf "%.3g ms", ns/1e6;
              else if (ns >= 1e3) printf "%.3g us", ns/1e3;
              else printf "%.3g ns", ns;
            }'
          }

          # Whitelisted hot-path groups (benches/hot_paths.rs), in report order.
          # These labels are the ONLY group strings that can reach the comment
          # body, so this list is a security control, not just ordering. Keep it
          # in sync with PREFERRED_ORDER in scripts/bench-summary.py: a group
          # added there but not here is silently left out of the charts (by
          # design - unknown names are dropped rather than rendered).
          BENCH_GROUPS="refcount primitive list map set string wrappers json"

          # One xychart-beta bar for groups whose median falls in [lo, hi) ns, so
          # orders-of-magnitude groups do not flatten (mermaid xychart has no log
          # axis). $1 summary json, $2 unit label, $3 ns divisor, $4 lo ns,
          # $5 hi ns, $6 title.
          emit_bench_group() {
            local summary="$1" unit="$2" divisor="$3" lo="$4" hi="$5" title="$6"
            local name med val labels="" values="" any=0
            for name in $BENCH_GROUPS; do
              med="$(jq -r --arg p "$name" '(.phases[] | select(.name == $p) | .median_ns) // empty' "$summary" 2>/dev/null || true)"
              is_num "$med" || continue
              awk -v m="$med" -v lo="$lo" -v hi="$hi" 'BEGIN { exit !(m >= lo && m < hi) }' || continue
              val="$(awk -v m="$med" -v d="$divisor" 'BEGIN { printf "%.4g", m / d }')"
              labels="${labels:+$labels, }\"$name\""
              values="${values:+$values, }$val"
              any=1
            done
            [ "$any" -eq 1 ] || return 0
            printf '```mermaid\n'
            printf 'xychart-beta\n'
            printf '    title "%s"\n' "$title"
            printf '    x-axis [%s]\n' "$labels"
            printf '    y-axis "%s"\n' "$unit"
            printf '    bar [%s]\n' "$values"
            printf '```\n\n'
          }

          # $1: path to the fork-produced summary json. jq reads it, but every
          # value is numeric-validated and every label is a trusted literal above.
          emit_bench_report() {
            local summary="$1"
            if [ -z "$summary" ] || [ ! -f "$summary" ]; then
              echo "note: no bench summary at '${summary:-<unset>}'; skipping charts" >&2
              return 0
            fi
            emit_bench_group "$summary" "nanoseconds" 1 0 1000 "Hot paths under 1 us (median)"
            emit_bench_group "$summary" "microseconds" 1000 1000 1000000000000 "Hot paths 1 us and up (median)"
            local name med n rows=""
            for name in $BENCH_GROUPS; do
              med="$(jq -r --arg p "$name" '(.phases[] | select(.name == $p) | .median_ns) // empty' "$summary" 2>/dev/null || true)"
              is_num "$med" || continue
              n="$(jq -r --arg p "$name" '(.phases[] | select(.name == $p) | .n) // empty' "$summary" 2>/dev/null || true)"
              [[ "$n" =~ ^[0-9]+$ ]] || n="?"
              rows="${rows}| \`$name\` | $(human_ns "$med") | $n |"$'\n'
            done
            [ -n "$rows" ] || return 0
            printf '| Group | Median | Samples |\n|:--|--:|--:|\n%s\n' "$rows"
          }

          # The valgrind job prints ">>> valgrind <bin>" per test binary and
          # "::error::Valgrind reported ..." on a failing one. Count those markers
          # (integers only) - no fork string reaches the rendered body.
          emit_valgrind_pie() {
            local logf="$1" total fails clean
            total="$(grep -Ec '^>>> valgrind ' "$logf" || true)"
            fails="$(grep -Ec '^::error::Valgrind reported' "$logf" || true)"
            { [[ "$total" =~ ^[0-9]+$ ]] && [[ "$fails" =~ ^[0-9]+$ ]] && [ "$total" -gt 0 ] && [ "$fails" -le "$total" ]; } || return 0
            clean=$(( total - fails ))
            printf '```mermaid\n'
            printf 'pie showData\n'
            printf '    title Test binaries under Valgrind (%s total)\n' "$total"
            printf '    "Clean" : %s\n' "$clean"
            printf '    "Leaking" : %s\n' "$fails"
            printf '```\n\n'
          }

          : > body.md
          wrote=0
          for spec in "${specs[@]}"; do
            IFS='|' read -r art logname title kind <<< "$spec"
            logf="reports/$art/$logname"
            concl="$(printf '%s' "$jobs_json" | jq -r --arg n "$title" 'map(select(.name == $n)) | .[0].conclusion // ""')"
            if [ ! -f "$logf" ]; then
              # No log: job was path-skipped or produced nothing. Note it only on
              # workflow-touching PRs.
              if [ "${touched_ci:-0}" -gt 0 ]; then
                case "$concl" in
                  skipped) note="Skipped - no relevant source changed in this PR." ;;
                  "") note="Job not found in this run." ;;
                  *) note="No report produced (job conclusion: $concl)." ;;
                esac
                printf '## %s - skipped\n\n_%s_\n\n' "$title" "$note" >> body.md
                wrote=1
              fi
              continue
            fi
            if [ "$kind" = "gated" ]; then
              case "$concl" in
                success) status="PASSED" ;;
                failure) status="FAILED" ;;
                *) status="${concl:-unknown}" ;;
              esac
            else
              status="report-only"
            fi
            {
              printf '## %s - %s\n\n' "$title" "$status"
              if [ "$art" = "pr-comment-valgrind" ]; then
                emit_valgrind_pie "$logf"
                emit_raw_details "$logf" "Full valgrind output (last 300 lines)"
              elif [ "$art" = "pr-comment-benchmarks" ]; then
                printf '_Informational only - shared runners are too noisy to gate on; full data is in the run artifacts._\n\n'
                emit_bench_report "reports/$art/bench-summary.json"
                emit_raw_details "$logf" "Full benchmark output (last 300 lines)"
              else
                emit_raw_details "$logf" "Output (last 300 lines)"
              fi
            } >> body.md
            wrote=1
          done
          if [ "$wrote" -eq 0 ]; then
            echo "Nothing to report for this PR; not commenting."
            exit 0
          fi
          printf '_Commit `%s` - [full run](%s)_\n' "$HEAD_SHA" "$RUN_URL" >> body.md
          gh pr comment "$PR" --repo "$REPO" --body-file body.md
